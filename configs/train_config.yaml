training_settings:
  max_seq_length: 1024
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  num_train_epochs: 2
  save_steps: 50
  save_total_limit: 3
  logging_steps: 1
  optim: "adamw_8bit"
  weight_decay: 0.01
  lr_scheduler_type: "linear"
  warmup_steps: 10
  seed: 3407

storage:
  drive_path: "/content/drive/MyDrive/Tamil-LLM"
  checkpoint_dir: "checkpoints"
  output_adapter_dir: "final_adapter"
